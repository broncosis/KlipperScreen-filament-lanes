# Add this block to your ~/printer_data/config/KlipperScreen.conf
# It places a "Filament Lanes" button in the top-level main menu.

[menu __main filament_lanes]
name: Filament Lanes
icon: filament
panel: filament_lanes

# Optional: show a Load button on each lane (default: hidden).
#show_load_buttons: true

# Optional: configure the bottom action bar buttons.
# Format: MACRO_NAME:Label:icon:style
# icon and style are optional.  style options: color1, color2, color3, color4
# If omitted, defaults to Clean Nozzle and Unselect Tool.
#action_button_1: CLEAN_NOZZLE:Clean Nozzle:clean:color1
#action_button_2: UNSELECT_TOOL:Unselect Tool:toolchanger:color2
#action_button_3: MY_MACRO:My Button::color3
