# Add this block to your ~/printer_data/config/KlipperScreen.conf
# It places a "Filament Lanes" button in the top-level main menu.

[menu __main filament_lanes]
name: Filament Lanes
icon: filament
panel: filament_lanes

# Optional: set show_load_buttons to true to reveal a Load button on each lane.
# Default (omit or false) shows only Unload.
#show_load_buttons: false
